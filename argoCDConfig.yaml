apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whattodo-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: whattodo=13rottenbanana/whattodo
    argocd-image-updater.argoproj.io/whattodo.update-strategy: digest
spec:
  project: default
  source:
    repoURL: https://github.com/Rotten-Banana/WhatToDo
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true