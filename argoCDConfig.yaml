apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whattodo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Rotten-Banana/WhatToDo
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true